<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="MindsAI Media — Quietly harnessing the power of new age AI. London-based AI advertising & automations agency." />
    <meta name="author" content="MindsAI Media" />

    <title>MindsAI Media — The Quiet Power of New-Age AI</title>

    <!-- Favicon — SVG scales sharp at every browser tab resolution. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph / Twitter — social sharing preview. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MindsAI Media" />
    <meta property="og:title" content="MindsAI Media — The Quiet Power of New-Age AI" />
    <meta property="og:description" content="London-based AI advertising and automations agency. Briefs taken in small number and specific." />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="MindsAI Media — AI advertising and automation agency, London" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="MindsAI Media" />
    <meta name="twitter:description" content="Quietly harnessing the power of new-age AI. London." />
    <meta name="twitter:image" content="/og-image.png" />

    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <!-- Fontshare CSS with display=block: brief FOIT while Satoshi loads,
         then shows crisp. Beats display=swap here because the alternative is
         a visible reflow/metric-shift mid-page when Satoshi replaces the
         fallback. For a premium site the swap flash reads worse than a 50ms
         invisible moment. -->
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=block" />

    <!-- Scroll restoration: manual. Set BEFORE React mounts so the browser
         doesn't restore scroll to a prior session's position between the
         HTML parse and React hydration (which would cause a jarring mid-
         scroll first paint on reload). -->
    <script>
      if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
      // Also force window.scrollY = 0 on every DOM-ready so any prior
      // "saved" position from the browser session is immediately overwritten.
      document.addEventListener('DOMContentLoaded', function() { window.scrollTo(0, 0); });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
